<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin productos | FlexCommerce</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header admin-header">
    <nav class="nav container">
        <a class="brand" th:href="@{/admin}">Panel Admin</a>
        <div class="nav-links">
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/reservas}">Reservas</a>
            <a th:href="@{/admin/pedidos}">Pedidos</a>
            <form th:action="@{/logout}" method="post" class="logout-form"><button type="submit">Salir</button></form>
        </div>
    </nav>
</header>

<main class="container section">
    <div class="section-heading row-heading">
        <div>
            <span class="eyebrow">Catálogo</span>
            <h1>Gestión de productos</h1>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/productos/nuevo}">Nuevo producto</a>
    </div>

    <div th:if="${success}" class="alert success" th:text="${success}">OK</div>
    <div th:if="${error}" class="alert error" th:text="${error}">Error</div>

    <section class="panel">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>IVA</th><th>Stock</th><th>Estado</th><th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}">1</td>
                <td><strong th:text="${p.name}">Producto</strong><br><small th:text="${p.sku}">SKU</small></td>
                <td th:text="${p.category}">Categoría</td>
                <td><span th:text="${p.price}">0.00</span> €</td>
                <td><span th:text="${p.ivaPercent}">21</span>%</td>
                <td th:text="${p.stock}">0</td>
                <td><span class="badge" th:classappend="${p.active} ? ' success' : ' danger'" th:text="${p.active} ? 'Activo' : 'Inactivo'">Activo</span></td>
                <td class="actions">
                    <a class="btn btn-small btn-outline" th:href="@{/admin/productos/{id}/editar(id=${p.id})}">Editar</a>
                    <form th:action="@{/admin/productos/{id}/activar(id=${p.id})}" method="post"><button class="btn btn-small" type="submit" th:text="${p.active} ? 'Desactivar' : 'Activar'">Estado</button></form>
                    <form th:action="@{/admin/productos/{id}/borrar(id=${p.id})}" method="post" onsubmit="return confirm('¿Eliminar producto?')"><button class="btn btn-small btn-danger" type="submit">Borrar</button></form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
