# ==============================================================
# FLEXCOMMERCE JAVA - CONFIGURACION DE DESARROLLO
# ==============================================================
server.port=8081
spring.application.name=flexcommerce-java

# Datos editables del negocio
app.business.name=FlexCommerce Java
app.business.subtitle=Tienda online y agenda de reservas adaptable a cualquier negocio.
app.business.phone=678 239 521
app.business.email=ahbhb1987@gmail.com
app.business.address=Barcelona

# Base de datos H2 persistente en archivo
spring.datasource.url=jdbc:h2:file:./data/flexcommerce;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# Logs utiles para desarrollo
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

